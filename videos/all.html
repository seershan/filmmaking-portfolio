<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mittergraph | Videos</title>
  <meta name="description" content="Seershan Mitra | Videos - Portfolio video gallery" />
  <link rel="stylesheet" href="../assets/css/site.css" />
  <link rel="stylesheet" href="all.css" />
  <link rel="icon" href="../assets/images/logo.png">
</head>
<body class="video-page">

  <div class="loading-screen" aria-hidden="true">
    <div class="loader">
      <div class="loader-mark"></div>
      <div class="kicker">Loading portfolio</div>
    </div>
  </div>

  <header class="nav-wrap" data-nav-wrap></header>

  <main class="section">
    <div class="container stack-xl">
      <div class="section-title reveal">
        <div>
          <div class="kicker">Videos</div>
          <h2>All Videos</h2>
        </div>
        <p class="mini-text">
          Click any poster to open the YouTube video in a new tab.
        </p>
      </div>

      <section class="card pad-lg reveal">
        <div class="video-grid" id="video-gallery">

          <article class="video-card"
                   data-youtube="https://youtu.be/XprCwfhgJLI?si=dZjhKJFeRnd6ggAg"
                   tabindex="0"
                   role="button"
                   aria-label="Open video in YouTube">
            <img src="../assets/thumbnails/video-1.png" alt="Video 1" loading="lazy">
            <button class="play-btn" type="button" aria-label="Play video"></button>
          </article>
          <article class="video-card"
                   data-youtube="https://youtu.be/f_neClRUSmw?si=HBC1-d--bVNhflOd"
                   tabindex="0"
                   role="button"
                   aria-label="Open video in YouTube">
            <img src="../assets/thumbnails/video-2.jpg" alt="Video 2" loading="lazy">
            <button class="play-btn" type="button" aria-label="Play video"></button>
          </article>
          <article class="video-card"
                   data-youtube="https://youtu.be/hKbInukroXI"
                   tabindex="0"
                   role="button"
                   aria-label="Open video in YouTube">
            <img src="../assets/thumbnails/video-3-b.jpg" alt="Video 3" loading="lazy">
            <button class="play-btn" type="button" aria-label="Play video"></button>
          </article>
          <article class="video-card"
                   data-youtube="https://youtu.be/rfgDNJ_VQHk"
                   tabindex="0"
                   role="button"
                   aria-label="Open video in YouTube">
            <img src="../assets/thumbnails/video-4.jpg" alt="Video 4" loading="lazy">
            <button class="play-btn" type="button" aria-label="Play video"></button>
          </article>
          <article class="video-card"
                   data-youtube="https://youtu.be/6SV4JOuLk50"
                   tabindex="0"
                   role="button"
                   aria-label="Open video in YouTube">
            <img src="../assets/thumbnails/video-5.jpg" alt="Video 5" loading="lazy">
            <button class="play-btn" type="button" aria-label="Play video"></button>
          </article>
          <article class="video-card"
                   data-youtube="https://youtu.be/j8ENO0ipNFU"
                   tabindex="0"
                   role="button"
                   aria-label="Open video in YouTube">
            <img src="../assets/thumbnails/video-6.jpg" alt="Video 6" loading="lazy">
            <button class="play-btn" type="button" aria-label="Play video"></button>
          </article>
          <article class="video-card"
                   data-youtube="https://youtu.be/4dxfTJOequg"
                   tabindex="0"
                   role="button"
                   aria-label="Open video in YouTube">
            <img src="../assets/thumbnails/video-7.jpg" alt="Video 7" loading="lazy">
            <button class="play-btn" type="button" aria-label="Play video"></button>
          </article>
          <article class="video-card"
                   data-youtube="https://youtu.be/V3bA_Q1WYDI"
                   tabindex="0"
                   role="button"
                   aria-label="Open video in YouTube">
            <img src="../assets/thumbnails/video-8.jpg" alt="Video 8" loading="lazy">
            <button class="play-btn" type="button" aria-label="Play video"></button>
          </article>

        </div>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div>Seershan Mitra · Filmmaker, Photographer, Visual Storyteller</div>
      <div class="footer-email">
        <a href="mailto:seershanmitra@gmail.com">seershanmitra@gmail.com</a>
      </div>
    </div>
  </footer>

  <script src="../assets/js/site.js"></script>
  <script src="all.js"></script>
</body>
</html>
